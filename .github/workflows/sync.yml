name: Sync Wyze Scale → Garmin Connect

# Runs at 12:30 UTC daily (7:30 AM CDT in summer, 6:30 AM CST in winter).
# GitHub Actions cron does not support timezones; a single fixed UTC time
# will drift by one hour across daylight saving transitions.
on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set true to skip Garmin uploads"
        required: false
        default: "false"
      date_from:
        description: "Optional start date (YYYY-MM-DD)"
        required: false
        default: ""
      date_to:
        description: "Optional end date (YYYY-MM-DD)"
        required: false
        default: ""

jobs:
  sync:
    name: Sync scale data
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Restore persisted state (cached OAuth tokens, synced checksums,
      # rate-limit backoff file) from the most recent previous run.
      - name: Restore sync state
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: scalesync-state-${{ github.run_id }}
          restore-keys: |
            scalesync-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # certifi 2026.4.22 dropped DigiCert Global Root CA (Mozilla distrust).
      # Wyze's api.wyzecam.com still chains to that root, so we append it back
      # to certifi's bundle explicitly. The cert is embedded here to avoid any
      # bootstrap SSL chicken-and-egg problem fetching it at runtime.
      - name: Patch certifi bundle with DigiCert Global Root CA
        run: |
          python - <<'PYEOF'
          import certifi
          digicert_global_root_ca = """
          # Issuer: CN=DigiCert Global Root CA O=DigiCert Inc OU=www.digicert.com
          # Subject: CN=DigiCert Global Root CA O=DigiCert Inc OU=www.digicert.com
          # Label: "DigiCert Global Root CA"
          # Serial: 10944719598952040374951832963794454346
          # MD5 Fingerprint: 79:e4:a9:84:0d:7d:3a:96:d7:c0:4f:e2:43:4c:89:2e
          # SHA1 Fingerprint: a8:98:5d:3a:65:e5:e5:c4:b2:d7:d6:6d:40:c6:dd:2f:b1:9c:54:36
          # SHA256 Fingerprint: 43:48:a0:e9:44:4c:78:cb:26:5e:05:8d:5e:89:44:b4:d8:4f:96:62:bd:26:db:25:7f:89:34:a4:43:c7:01:61
          -----BEGIN CERTIFICATE-----
          MIIDrzCCApegAwIBAgIQCDvgVpBCRrGhdWrJWZHHSjANBgkqhkiG9w0BAQUFADBh
          MQswCQYDVQQGEwJVUzEVMBMGA1UEChMMRGlnaUNlcnQgSW5jMRkwFwYDVQQLExB3
          d3cuZGlnaWNlcnQuY29tMSAwHgYDVQQDExdEaWdpQ2VydCBHbG9iYWwgUm9vdCBD
          QTAeFw0wNjExMTAwMDAwMDBaFw0zMTExMTAwMDAwMDBaMGExCzAJBgNVBAYTAlVT
          MRUwEwYDVQQKEwxEaWdpQ2VydCBJbmMxGTAXBgNVBAsTEHd3dy5kaWdpY2VydC5j
          b20xIDAeBgNVBAMTF0RpZ2lDZXJ0IEdsb2JhbCBSb290IENBMIIBIjANBgkqhkiG
          9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4jvhEXLeqKTTo1eqUKKPC3eQyaKl7hLOllsB
          CSDMAZOnTjC3U/dDxGkAV53ijSLdhwZAAIEJzs4bg7/fzTtxRuLWZscFs3YnFo97
          nh6Vfe63SKMI2tavegw5BmV/Sl0fvBf4q77uKNd0f3p4mVmFaG5cIzJLv07A6Fpt
          43C/dxC//AH2hdmoRBBYMql1GNXRor5H4idq9Joz+EkIYIvUX7Q6hL+hqkpMfT7P
          T19sdl6gSzeRntwi5m3OFBqOasv+zbMUZBfHWymeMr/y7vrTC0LUq7dBMtoM1O/4
          gdW7jVg/tRvoSSiicNoxBN33shbyTApOB6jtSj1etX+jkMOvJwIDAQABo2MwYTAO
          BgNVHQ8BAf8EBAMCAYYwDwYDVR0TAQH/BAUwAwEB/zAdBgNVHQ4EFgQUA95QNVbR
          TLtm8KPiGxvDl7I90VUwHwYDVR0jBBgwFoAUA95QNVbRTLtm8KPiGxvDl7I90VUw
          DQYJKoZIhvcNAQEFBQADggEBAMucN6pIExIK+t1EnE9SsPTfrgT1eXkIoyQY/Esr
          hMAtudXH/vTBH1jLuG2cenTnmCmrEbXjcKChzUyImZOMkXDiqw8cvpOp/2PV5Adg
          06O/nVsJ8dWO41P0jmP6P6fbtGbfYmbW0W5BjfIttep3Sp+dWOIrWcBAI+0tKIJF
          PnlUkiaY4IBIqDfv8NZ5YBberOgOzW6sRBc4L0na4UU+Krk2U886UAb3LujEV0ls
          YSEY1QSteDwsOoBrp+uvFRTp2InBuThs4pFsiv9kuXclVzDAGySj4dzp30d8tbQk
          CAUw7C29C79Fv1C5qfPrmAESrciIxpg0X40KPMbp1ZWVbd4=
          -----END CERTIFICATE-----
          """
          import textwrap
          pem = textwrap.dedent(digicert_global_root_ca).strip()
          bundle_path = certifi.where()
          with open(bundle_path, "a") as f:
              f.write("\n" + pem + "\n")
          print(f"Appended DigiCert Global Root CA to {bundle_path}")
          PYEOF

      - name: Validate inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          DRY_RUN_VAL="${{ github.event.inputs.dry_run }}"
          DATE_FROM_VAL="${{ github.event.inputs.date_from }}"
          DATE_TO_VAL="${{ github.event.inputs.date_to }}"
          if [[ -n "$DRY_RUN_VAL" && "$DRY_RUN_VAL" != "true" && "$DRY_RUN_VAL" != "false" ]]; then
            echo "ERROR: dry_run must be 'true' or 'false', got: $DRY_RUN_VAL"
            exit 1
          fi
          if [[ -n "$DATE_FROM_VAL" && ! "$DATE_FROM_VAL" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "ERROR: date_from must be YYYY-MM-DD, got: $DATE_FROM_VAL"
            exit 1
          fi
          if [[ -n "$DATE_TO_VAL" && ! "$DATE_TO_VAL" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "ERROR: date_to must be YYYY-MM-DD, got: $DATE_TO_VAL"
            exit 1
          fi

      - name: Run sync
        env:
          WYZE_EMAIL:    ${{ secrets.WYZE_EMAIL }}
          WYZE_PASSWORD: ${{ secrets.WYZE_PASSWORD }}
          WYZE_KEY_ID:   ${{ secrets.WYZE_KEY_ID }}
          WYZE_API_KEY:  ${{ secrets.WYZE_API_KEY }}
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          # Point state files at the cached data directory
          DATA_DIR: data
          # Manual run input overrides repo variable; default is live upload.
          DRY_RUN: ${{ github.event.inputs.dry_run || vars.DRY_RUN || 'false' }}
          DATE_FROM: ${{ github.event.inputs.date_from || vars.DATE_FROM || '' }}
          DATE_TO: ${{ github.event.inputs.date_to || vars.DATE_TO || '' }}
        # Authenticate once, then retry the sync every 5 min for up to 30 min.
        # Reusing clients avoids repeated auth calls that can trigger rate limits.
        run: |
          python - <<'EOF'
          import time
          from sync import sync_once, wyze_auth, garmin_auth, GarminRateLimitBackoff

          RETRY_INTERVAL_SEC = 300  # 5 minutes
          MAX_RETRIES = 6           # 30 minutes total

          wyze_token = wyze_auth()

          try:
              garmin_client = garmin_auth()
          except GarminRateLimitBackoff as e:
              # Still within the self-imposed backoff after a prior 429.
              # Exit cleanly so we don't extend the ban with another attempt.
              print(str(e))
              raise SystemExit(0)

          if sync_once(wyze_token, garmin_client) > 0:
              raise SystemExit(0)

          for attempt in range(1, MAX_RETRIES + 1):
              print(f"No records uploaded. Waiting 5 minutes before retry {attempt}/{MAX_RETRIES}...")
              time.sleep(RETRY_INTERVAL_SEC)
              if sync_once(wyze_token, garmin_client) > 0:
                  raise SystemExit(0)

          print("No records found after 30 minutes of retries.")
          EOF

      # Save state unconditionally so the Garmin rate-limit backoff file
      # and cached OAuth tokens persist even when the job fails.
      - name: Save sync state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: scalesync-state-${{ github.run_id }}
