name: Sync Wyze Scale → Garmin Connect

# Runs every 6 hours automatically, or trigger manually from the Actions tab.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set true to skip Garmin uploads"
        required: false
        default: "false"
      date_from:
        description: "Optional start date (YYYY-MM-DD)"
        required: false
        default: ""
      date_to:
        description: "Optional end date (YYYY-MM-DD)"
        required: false
        default: ""

jobs:
  sync:
    name: Sync scale data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Persist Garmin OAuth tokens and the list of already-synced checksums
      # between workflow runs so we don't re-upload duplicates or re-login every time.
      - name: Restore sync state
        uses: actions/cache@v4
        with:
          path: data/
          # New key each run so the latest state is always saved.
          key: scalesync-state-${{ github.run_id }}
          restore-keys: |
            scalesync-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          DRY_RUN_VAL="${{ github.event.inputs.dry_run }}"
          DATE_FROM_VAL="${{ github.event.inputs.date_from }}"
          DATE_TO_VAL="${{ github.event.inputs.date_to }}"
          if [[ -n "$DRY_RUN_VAL" && "$DRY_RUN_VAL" != "true" && "$DRY_RUN_VAL" != "false" ]]; then
            echo "ERROR: dry_run must be 'true' or 'false', got: $DRY_RUN_VAL"
            exit 1
          fi
          if [[ -n "$DATE_FROM_VAL" && ! "$DATE_FROM_VAL" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "ERROR: date_from must be YYYY-MM-DD, got: $DATE_FROM_VAL"
            exit 1
          fi
          if [[ -n "$DATE_TO_VAL" && ! "$DATE_TO_VAL" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "ERROR: date_to must be YYYY-MM-DD, got: $DATE_TO_VAL"
            exit 1
          fi

      - name: Run sync
        env:
          WYZE_EMAIL:    ${{ secrets.WYZE_EMAIL }}
          WYZE_PASSWORD: ${{ secrets.WYZE_PASSWORD }}
          WYZE_KEY_ID:   ${{ secrets.WYZE_KEY_ID }}
          WYZE_API_KEY:  ${{ secrets.WYZE_API_KEY }}
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          # Point state files at the cached data directory
          DATA_DIR: data
          # Manual run input overrides repo variable; default is live upload.
          DRY_RUN: ${{ github.event.inputs.dry_run || vars.DRY_RUN || 'false' }}
          DATE_FROM: ${{ github.event.inputs.date_from || vars.DATE_FROM || '' }}
          DATE_TO: ${{ github.event.inputs.date_to || vars.DATE_TO || '' }}
        # Call sync_once() directly — no infinite loop needed in CI.
        run: python -c "from sync import sync_once; sync_once()"
